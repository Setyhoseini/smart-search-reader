Around the same time as Dunne was writing, C.D. Broad (1925) used a thought-experiment as part of an argument against a mechanistic version of physicalism. Broad argues that even if the mechanistic theory of chemistry were true there still would be a property of ammonia that a mathematical archangel endowed with unlimited mathematical skills and “gifted with the further power of perceiving the microscopic structure of atoms” could not predict, namely its smell:\nHe [the archangel] would know exactly what the microscopic structure of ammonia must be; but he would be totally unable to predict that a substance with this structure must smell as ammonia does when it gets into the human nose. The utmost that he could predict on this subject would be that certain changes would take place in the mucous membrane, the olfactory nerves and so on. But he could not possibly know that theses changes would be accompanied by the appearance of a smell in general or of the peculiar smell of ammonia in particular, unless someone told him so or he had smelled it for himself (1925, 71).[1]\nUnder the title “The Cognitive Role of Acquaintance,” H. Feigl (1958) briefly discusses the epistemic limitations of a Martian who studies human behavior but does not share human sentiments:\n\nThe first question I wish to discuss concerns the cognitive ‘plus’, i.e., the alleged advantages of knowledge by acquaintance over knowledge by description. We may ask, for example, what does the seeing person know that the congenitally blind person could not know. Or, to take two examples from Eddington, what could a someone know about the effects of jokes if he had no sense of humor? Could a Martian, entirely without sentiments of compassion and piety, know about what is going on during a commemoration of the armistice? For the sake of argument, we assume complete physical predictability and explainability of the behavior of humans equipped with vision, a sense of humor, and sentiments of piety. The Martian could then predict all responses, including the linguistic utterances of the earthlings in the situations which involve their visual perceptions, their laughter about jokes, or their (solemn) behavior at the commemoration. But ex hypothesi, the Martian would be lacking completely in the sort of imagery and empathy which depends on familiarity (direct acquaintance) with the kinds of qualia to be imaged or empathized (1958, 431).\nB. A. Farrell had earlier presented a similar thought experiment featuring a Martian; in this version, it is humans who lack knowledge of what it is like for the Martian to exercise his sensory capacities (1950, 183; though Farrell ultimately argues that this thought experiment does not present a challenge to physicalism). Paul E. Meehl, responding to Feigl, describes two individuals who each have complete neurophysiological knowledge, one of whom is congenitally blind; he takes it as intuitive that this person does not know something which the other does, namely “what red looks like” (1966, 151).\nMore recent examples from the literature come closer to being versions of the Knowledge Argument rather than merely precursors to it. For example, consider the following statement of the knowledge intuition by Nicholas Maxwell:\n\nfrom a complete physicalist description alone it would be impossible to deduce the perceptual qualities of things, but this is due, not to the fact that things do not really possess perceptual qualities, but to the fact that the physicalist description is incomplete: it does not tell us all that there is to know about the world. It does not tell us what it is like to be a human being alive and experiencing in the world (1965, 309).[2]\nHoward Robinson, writing the same year as Jackson published ‘Epiphenomenal Qualia’, describes a deaf scientist “who knows everything there is to know about the physical processes involved in hearing”, but who intuitively does not know what it is like to hear (1982, 4). Saul Kripke had outlined similar ideas in unpublished lectures given in 1979 (Renero 2023).\n\nFinally, it is worth mentioning the extremely influential thought experiment described by Thomas Nagel (1974). According to Nagel, the physical facts about an organism and its perceptual systems are “objective facts par excellence – the kind that can be observed and understood from many points of view and by individuals with differing perceptual systems” (1974, 442). Nagel argues that even if we knew all the objective facts about a bat’s sonar system, we would still not know what it would be like to perceive using this system. Therefore, complete knowledge of the physical facts about a bat’s perceptual system would not yield knowledge of certain facts about a bat’s experiences; these facts can only be captured from a subjective perspective. Nagel does not argue against physicalism, but rather claims that we presently have no understanding of how it can be true. In Section 4.9, we shall outline a related approach to the knowledge argument which interprets it as a challenge not to physicalism but to a position called objectivism."])</script><script>self.__next_f.push([1,"0:{\"P\":null,\"c\":[\"\",\"_not-found\"],\"q\":\"\",\"i\":false,\"f\":[[[\"\",{\"children\":[\"/_not-found\",{\"children\":[\"__PAGE__\",{}]}]},\"$undefined\",\"$undefined\",16],[[\"$\",\"$1\",\"c\",{\"children\":[[[\"$\",\"link\",\"0\",{\"rel\":\"stylesheet\",\"href\":\"/_next/static/chunks/2e62y-rksf3vf.css\",\"precedence\":\"next\",\"crossOrigin\":\"$undefined\",\"nonce\":\"$undefined\"}],[\"$\",\"script\",\"script-0\",{\"src\":\"/_next/static/chunks/21zf9l2iy0alh.js\",\"async\":true,\"nonce\":\"$undefined\"}],[\"$\",\"script\",\"script-1\",{\"src\":\"/_next/static/chunks/14mumt5_n0xhi.js\",\"async\":true,\"nonce\":\"$undefined\"}]],[\"$\",\"html\",null,{\"lang\":\"en\",\"className\":\"h-full antialiased\",\"children\":[\"$\",\"$L2\",null,{\"initialText\":\"$3\",\"children\":\"$L4\"}]}]]}],{\"children\":[\"$L5\",{\"children
